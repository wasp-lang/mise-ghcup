name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        env:
          - os: macos-latest
          - os: macos-26-intel

          - os: ubuntu-latest
          - os: ubuntu-26.04-arm

          - os: ubuntu-latest
            image: alpine
            install-step: apk add binutils-gold curl gcc g++ gmp-dev libc-dev libffi-dev make musl-dev ncurses-dev perl tar xz

          - os: windows-latest
          - os: windows-11-vs2026-arm

        tool:
          - name: cabal
            command: cabal
          - name: ghc
            command: ghc
          - name: hls
            command: haskell-language-server-wrapper
          - name: stack
            command: stack

    name: Test (${{ format(matrix.env.image && '{1} on {0}' || '{0}', matrix.env.os, matrix.env.image) }}, ${{ matrix.tool.name }})

    runs-on: ${{ matrix.env.os }}
    container:
      image: ${{ matrix.env.image }}

    steps:
      - if: matrix.env.install-step
        run: ${{ matrix.env.install-step }}

      - uses: actions/checkout@v6
        with:
          path: ./plugin

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false
          cache: false
          log_level: debug
          mise_toml: |
            [tools]
            "aqua:ghcup" = "latest"
            "mise-ghcup:${{ matrix.tool.name }}" = "latest"

            [settings]
            aqua.baked_registry = false

      - run: mise plugin link --force mise-ghcup ./plugin

      - run: mise install
        id: install

      - if: steps.install.outcome == 'failure' && runner.os == 'Windows'
        name: Upload logs
        uses: actions/upload-artifact@v6
        with:
          name: mise-install-logs-${{ matrix.env.os }}-${{ matrix.tool.name }}
          path: C:\Users\runneradmin\AppData\Local\mise\plugins\mise-ghcup\ghcup\logs

      - run: mise exec mise-ghcup:${{ matrix.tool.name }}@latest -- ${{ matrix.tool.command }} --version
      - run: |
          mise exec mise-ghcup:${{ matrix.tool.name }}@latest -- ${{ runner.os == 'Windows' && 'where' || 'which' }} ${{ matrix.tool.command }}
