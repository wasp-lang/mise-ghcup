name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        tool:
          - name: cabal
            command: cabal
          - name: ghc
            command: ghc
          - name: hls
            command: haskell-language-server-wrapper
          - name: stack
            command: stack

    name: Test (${{ matrix.os }}, ${{ matrix.tool.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: ./plugin

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false
          cache: false
          log_level: debug
          mise_toml: |
            [tools."github:haskell/ghcup-hs"]
            version = "latest"
            bin = "ghcup"

            [tools."ghcup:${{ matrix.tool.name }}"]
            version = "latest"
            depends = "github:haskell/ghcup-hs"

      - run: mise plugin link --force ghcup ./plugin
      - run: mise install
      - run: mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ matrix.tool.command }} --version
      - run: |
          mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ runner.os == 'Windows' && 'where' || 'which' }} ${{ matrix.tool.command }}
