name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        env:
          - os: macos-latest
          - os: macos-26-intel
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: ubuntu-latest
            image: alpine
            install-step: apk add binutils-gold curl gcc g++ gmp-dev libc-dev libffi-dev make musl-dev ncurses-dev perl tar xz
          - os: windows-latest
        tool:
          - name: cabal
            command: cabal
          - name: ghc
            command: ghc
          - name: hls
            command: haskell-language-server-wrapper
          - name: stack
            command: stack

    name: Test (${{ format(matrix.env.image && '{1} on {0}' || '{0}', matrix.env.os, matrix.env.image) }}, ${{ matrix.tool.name }})

    runs-on: ${{ matrix.env.os }}
    container:
      image: ${{ matrix.env.image }}

    steps:
      - if: matrix.env.install-step
        run: ${{ matrix.env.install-step }}

      - uses: actions/checkout@v6
        with:
          path: ./plugin

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false
          cache: false
          log_level: debug
          mise_toml: |
            [tools]
            "ghcup" = { version = "latest", bin = "ghcup" }
            "ghcup:${{ matrix.tool.name }}" = "latest"

            [tool_alias]
            "ghcup" = "github:haskell/ghcup-hs"

      - run: mise plugin link --force ghcup ./plugin
      - run: mise install
      - run: mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ matrix.tool.command }} --version
      - run: |
          mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ runner.os == 'Windows' && 'where' || 'which' }} ${{ matrix.tool.command }}
