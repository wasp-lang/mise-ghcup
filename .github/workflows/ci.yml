name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - macos-26-intel
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
        image:
          - ""
        tool:
          - name: cabal
            command: cabal
          - name: ghc
            command: ghc
          - name: hls
            command: haskell-language-server-wrapper
          - name: stack
            command: stack
        include:
          - os: ubuntu-latest
            image: alpine
          - os: ubuntu-24.04-arm
            image: alpine

    name: Test (${{ matrix.os }}, ${{ matrix.tool.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          path: ./plugin

      - uses: jdx/mise-action@v4
        with:
          experimental: true
          install: false
          cache: false
          log_level: debug
          mise_toml: |
            [tools]
            "ghcup" = { version = "latest", bin = "ghcup" }
            "ghcup:${{ matrix.tool.name }}" = "latest"

            [tool_alias]
            "ghcup" = "github:haskell/ghcup-hs"

      - run: mise plugin link --force ghcup ./plugin
      - run: mise install
      - run: mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ matrix.tool.command }} --version
      - run: |
          mise exec ghcup:${{ matrix.tool.name }}@latest -- ${{ runner.os == 'Windows' && 'where' || 'which' }} ${{ matrix.tool.command }}
